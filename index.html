<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>ECommerce</title>
</head>
<body>
    <div class="main-section">
        <div class="navbar">
            <div class="company">
                <h2>ECommerce</h2>
            </div>
            <div class="products">
            <ul>
                <li>Laptop</li>
                <li>Mobile</li>
                <li>AC</li>
                <li>TV</li>
                <li>Camera</li>
                <li>Watch</li>
                </ul>
            </div>
        </div>
        <div class="banner-section">
            <img src="products/banner.png" alt="banner" />
        </div>
        <h2> New Products</h2>
        <div class="category-section">
            <ul>
                <li>
                    <figure>
                    <img src="products/new products/ac.jpg" />
                    <figcaption>AC
                        <button class="add-to-cart">Add to Cart</button>
                    </figcaption>
                    </figure>
                    
                </li>
                <li>
                    <figure>
                    <img src="products/new products/speakers.jpg" />
                    <figcaption>Speakers
                        <button class="add-to-cart" data-product="Speakers">Add to Cart</button>
                    </figcaption>

                </figure>
                </li>
                <li>
                    <figure>
                    <img src="products/new products/tv.jpg" />
                    <figcaption>TV
                        <button class="add-to-cart" data-product="TV">Add to Cart</button>
                    </figcaption>
                    </figure>
                </li>
                <li>
                    <figure>
                    <img src="products/new products/camera.jpg" />
                    <figcaption>Camera
                        <button class="add-to-cart" data-product="Camera">Add to Cart</button>
                    </figcaption>
                </figure>
                </li>
                <li>
                    <figure>
                    <img src="products/new products/earpods.jpg" />
                    <figcaption>Earpods
                        <button class="add-to-cart" data-product="Earpods">Add to Cart</button>
                    </figcaption>
                    </figure>
                </li>
            
                <li>
                    <figure>
                    <img src="products/new products/phone.jpg" />
                    <figcaption>Phone
                        <button class="add-to-cart" data-product="Phone">Add to Cart</button>
                    </figcaption>
                    </figure>
                </li>
            </ul>
        </div>



        <div>
            <h2> New Arrivals</h2>
        </div>
        <div class="arrival-section">
            <div class="sub-section">
                <ul>
                    <li>
                      <figure>
                      <img src="products/new arrivals/apple tablet.jpg" alt="">
                    <figcaption>Apple Tablet
                        <button class="add-to-cart" data-product="Apple Tablet">Add to Cart</button>
                    </figcaption>
                    </figure>
                      </figure>
                    </li>
                    <li>
                       <figure>       
                      <img src="products/new arrivals/mixer.jpg" alt="">
                      <figcaption>Usha Mixer
                        <button class="add-to-cart" data-product="Usha Mixer">Add to Cart</button>
                      </figcaption>
                    </figure>
                      
                    </li>
                    <li>
                       <figure>
                      <img src="products/new arrivals/boat headphones.jpeg" alt="">
                <figcaption>Boat HeadPhones
                    <button class="add-to-cart" data-product="HeadPhones">Add to Cart</button>
                </figcaption>
                    </figure>
                    </li>          
                    <li>
                      <figure>
                      <img src="products/new arrivals/dell laptop.jpeg" alt="">
                      <figcaption>Phone
                        <button class="add-to-cart" data-product="Phone">Add to Cart</button>
                      </figcaption>
                    </figure>
                    </li>
                    <li>
                      <figure>
                      <img src="products/new arrivals/samsung ac.jpg" alt="">
                    <figcaption>Samaung AC
                        <button class="add-to-cart" data-product="Samaung AC">Add to Cart</button>
                    </figcaption>
                    </figure>
                    </li>
                    <li>
                       <figure>
                      <img src="products/new arrivals/samsung mobiles.jpg" alt="">
                          <figcaption>Samsung Mobiles
                            <button class="add-to-cart" data-product="Samaung Mobiles">Add to Cart</button>
                          </figcaption>
                    </figure>                 
                    </li>
                    <li>
                      <figure>
                      <img src="products/new arrivals/samsung tv.jpg" alt="">
                      <figcaption>Samsung TV
                        <button class="add-to-cart" data-product="Samaung TV">Add to Cart</button>
                      </figcaption>
                    </figure>
                    </li>
                    <li>
                   <figure>
                        <img src="products/new arrivals/speakers.jpg" alt="">
                        <figcaption>Speakers
                            <button class="add-to-cart" data-product="Speakers">Add to Cart</button>
                        </figcaption>
                    </figure>
                    </li>
        </div>
        </div>
        <div class="discount-section">
         <img src="products/discounts/boat 450.jpg" alt="">
         <img src="products/discounts/boult audio.jpg" alt="">
         <img src="products/discounts/camera.jpg" alt="">
         <img src="products/discounts/fireboltt.jpg" alt="">
         <img src="products/discounts/i5 laptop.jpg" alt="">
         <img src="products/discounts/lenevo idea pad.jpg" alt="">
         <img src="products/discounts/redmi pad.jpg" alt="">
         <img src="products/discounts/sony camera.jpg" alt="">
         </div>
        <div class="footer">
            <img src="products/footer.png" alt="">
        </div>
    </div>
    <script>
    // Example: Alert when page loads
    window.onload = function() {
        alert("Welcome to ECommerce!");
    };

    // Example: Hover effect log
    document.querySelectorAll('.category-section li').forEach(item => {
        item.addEventListener('mouseover', () => {
            console.log("Hovered on: " + item.textContent.trim());
        });
    });
</script>
<script src="script.js"></script>

</body>
</html>
